services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    # Load environment variables from the backend .env file
    env_file:
      - ./backend/.env
    restart: always
    networks:
      default:
        aliases:
          - backend

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: always
    networks:
      - default
